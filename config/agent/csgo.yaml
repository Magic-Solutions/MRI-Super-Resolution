_target_: agent.AgentConfig

denoiser:
  _target_: models.diffusion.DenoiserConfig
  sigma_data: 0.5
  sigma_offset_noise: 0.1
  noise_previous_obs: true
  upsampling_factor: null
  inner_model:
    _target_: models.diffusion.InnerModelConfig
    img_channels: ${eval:'4 if ${use_depth} else 3'}
    num_steps_conditioning: 4
    cond_channels: 1024
    depths:
    - 2
    - 2
    - 2
    - 2
    channels:
    - 64
    - 128
    - 256
    - 512
    attn_depths:
    - 0
    - 0
    - 1
    - 1

upsampler:
  _target_: models.diffusion.DenoiserConfig
  sigma_data: 0.5
  sigma_offset_noise: 0.1
  noise_previous_obs: false
  upsampling_factor: 5
  inner_model:
    _target_: models.diffusion.InnerModelConfig
    img_channels: ${eval:'4 if ${use_depth} else 3'}
    num_steps_conditioning: 1
    cond_channels: 1024
    depths:
    - 2
    - 2
    - 2
    - 2
    channels:
    - 32
    - 32
    - 64
    - 128
    attn_depths:
    - 0
    - 0
    - 0
    - 1
  
rew_end_model: null 

actor_critic: null 
